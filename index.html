<body>
<header>

  <div id="authBar">

</header>
<div class="toolbar">
<button onclick="openJob()">+ Zakázka</button><button onclick="openWorker()">+ Pracovník</button><button onclick="openVehicle()">+ Vozidlo</button>
<button class="secondary" onclick="prevWeek()">← týden</button><button class="secondary" onclick="goToday()">dnes</button><button class="secondary" onclick="nextWeek()">týden →</button>
<input id="search" placeholder="Hledat zakázku, adresu, kontakt..." oninput="render()">

</div>
<div class="layout">
<aside>
<div class="tabs"><div class="tab active" id="tabJobs" onclick="switchTab('jobs')">Zakázky</div><div class="tab" id="tabPeople" onclick="switchTab('people')">Lidé</div><div class="tab" id="tabCars" onclick="switchTab('cars')">Vozidla</div></div>
<section id="sideJobs"><h2 id="jobsTitle">Zakázky</h2><div id="unassigned" class="list"></div></section>

</aside>
<main class="board-wrap"><div class="board"><div id="head" class="head"></div><div id="body"></div></div></main>
</div>
<div id="jobModal" class="modal"><div class="dialog"><h2 id="jobModalTitle">Zakázka</h2>
<div class="grid">
<label>Název zakázky<input id="j_title"></label>
<label>Priorita<select id="j_priority"><option>Vysoká</option><option>Střední</option><option>Nízká</option></select></label>
<label>Požadovaná odbornost<select id="j_skill"><option>Elektroinstalace</option><option>Optika</option><option>Kancelář</option><option>Servis</option><option>Montáž</option><option>Revize</option><option>Bez požadavku</option></select></label>
<label>Stav<select id="j_state"><option>Nová</option><option>Naplánováno</option><option>Probíhá</option><option>Dokončeno</option><option>Vyfakturováno</option><option>Storno</option></select></label>
<label class="full">Adresa<input id="j_address"></label><label>Kontakt<input id="j_contact"></label><label>Telefon<input id="j_phone"></label><label>
  Hlavní technik
  <select id="j_lead_worker"></select>
</label>
<label>Počet dní<input id="j_days" type="number" min="0" step="0.5" value="1" oninput="syncEstimateFromDaysPeople()"></label>
<label>Počet pracovníků<input id="j_people" type="number" min="0" step="1" value="1" oninput="syncEstimateFromDaysPeople()"></label>
<label>Odhad hodin<input id="j_estimated" type="number" min="0" step="0.5" value="10"></label>
<label>Hodin Pracovníka<input id="j_load" type="number" min="0" max="24" step="0.5" value="10"></label>
<label>Hodin vozidla hod.<input id="j_vehicle_load" type="number" min="0" max="24" step="0.5" value="10"></label>
<label>Čas od
  <input
    id="j_from"
    type="time"
    oninput="syncHoursFromTime()">
</label>
<label>Čas do
  <input
    id="j_to"
    type="time"
    oninput="syncHoursFromTime()">
</label>
<label class="full">Poznámka<textarea id="j_note" rows="4"></textarea></label>
</div><div id="jobStats" class="small" style="margin-top:10px"></div>
<div class="actions"><button class="secondary" onclick="closeModal('jobModal')">Zavřít</button><button class="secondary" id="duplicateJobBtn" onclick="duplicateJob()">Duplikovat</button><button class="secondary" id="completeJobBtn" onclick="setJobState('Dokončeno')">Dokončeno</button><button class="secondary" id="invoiceJobBtn" onclick="setJobState('Vyfakturováno')">Vyfakturováno</button><button class="danger" id="deleteJobBtn" onclick="deleteJob()">Smazat</button><button onclick="saveJob()">Uložit</button></div>
</div></div>
<div id="workerModal" class="modal"><div class="dialog"><h2 id="workerModalTitle">Pracovník</h2><div class="grid">
<label>Jméno<input id="w_title"></label><label>Email<input id="w_email"></label><label>Telefon<input id="w_phone"></label><label>Kapacita hodin / den<input id="w_capacity" type="number" min="0" max="24" value="10"></label>
<label class="full">Specializace pracovníka<select id="w_skills" multiple size="6"><option>Elektroinstalace</option><option>Optika</option><option>Kancelář</option><option>Servis</option><option>Montáž</option><option>Revize</option></select><div class="small">Podrž Ctrl pro výběr více specializací.</div></label>
</div><div class="actions"><button class="secondary" onclick="closeModal('workerModal')">Zavřít</button><button class="danger" id="deleteWorkerBtn" onclick="deleteWorker()">Smazat</button><button onclick="saveWorker()">Uložit</button></div></div></div>
<div id="vehicleModal" class="modal"><div class="dialog"><h2 id="vehicleModalTitle">Vozidlo</h2><div class="grid">
<label>Název / označení<input id="v_title"></label><label>SPZ<input id="v_spz"></label><label>Typ<input id="v_type"></label><label>Kapacita hod.<input id="v_capacity" type="number" min="0" max="24" value="10"></label><label class="full">Poznámka<textarea id="v_note" rows="3"></textarea></label>
</div><div class="actions"><button class="secondary" onclick="closeModal('vehicleModal')">Zavřít</button><button class="danger" id="deleteVehicleBtn" onclick="deleteVehicle()">Smazat</button><button onclick="saveVehicle()">Uložit</button></div></div></div>
<div id="assignModal" class="modal"><div class="dialog"><h2>Přiřazení zakázky</h2><p class="small">Zakázku můžeš přiřadit pracovníkovi i vozidlu. Nesoulad odbornosti se jen označí, neblokuje.</p>
<div class="grid"><label>Zakázka<input id="a_job_title" disabled></label><label>Datum<input id="a_date" type="date"></label><label>Pracovník<select id="a_worker"></select></label><label>Vozidlo<select id="a_vehicle"></select></label><label>Vytížení pracovníka hod.<input id="a_load" type="number" min="0" max="24" step="0.5"></label><label>Vytížení vozidla hod.<input id="a_vehicle_load" type="number" min="0" max="24" step="0.5"></label></div>
<div class="actions"><button class="secondary" onclick="closeModal('assignModal')">Zavřít</button><button class="danger" onclick="unassignCurrent()">Odebrat z plánu</button><button onclick="saveAssignmentFromModal()">Uložit přiřazení</button></div></div></div>

<script>

let db = {
  jobs: [],
  workers: [],
  vehicles: [],
  assignments: [],
  notes: [],
  absences: []
};
let weekStart = monday(new Date());
let selectedJobId = null;
let selectedWorkerId = null;
let selectedVehicleId = null;
let selectedAssignmentId = null;
let currentUser = null;
let realtimeSubscribed = false;
let canEdit = false; 

function createEmptyDb(){return{jobs:[],workers:[],vehicles:[],assignments:[],notes:[],absences:[]}}
async function loadDb(){
  if(!currentUser) return;

  const { data, error } = await supabaseClient
    .from("app_state")
    .select("data")
    .eq("id", 1)
    .maybeSingle();

  if(error){
    console.error("LOAD ERROR:", error);
    alert("Chyba načtení supabase: " + error.message);
    return;
  }

  if(data?.data){
    db = data.data;
  }else{
    db = createEmptyDb();
    await saveDb();
  }

  // DOPLNIT ↓↓↓

  if(!db.notes){
    db.notes = [];
  }

  if(!db.absences){
    db.absences = [];
  }

  // migrace starých procent na hodiny
  db.workers.forEach(w => {
    if(w.capacity === 100){
      w.capacity = 10;
    }
  });

  db.vehicles.forEach(v => {
    if(v.capacity === 100){
      v.capacity = 10;
    }
  });

  render();
}
async function saveDb(){
  if(!currentUser){
    alert("Nejste přihlášen");
    return false;
  }
  const { error } = await supabaseClient
    .from("app_state")
    .upsert({
      id: 1,
      data: db,
      updated_by: currentUser.email
    });
  if(error){
    console.error("SAVE ERROR:", error);
    alert("Chyba ukládání: " + error.message);
    return false;
  }
  setStatus("Uloženo do cloudu");
  return true;
}

function jobById(id){return db.jobs.find(j=>Number(j.id)===Number(id))}
function workerById(id){return db.workers.find(w=>Number(w.id)===Number(id))}
function vehicleById(id){return db.vehicles.find(v=>Number(v.id)===Number(id))}
function assignmentById(id){return db.assignments.find(a=>Number(a.id)===Number(id))}
function getSelectedMulti(id){return Array.from(document.getElementById(id).selectedOptions).map(o=>o.value)}
function setSelectedMulti(id,values){const set=new Set(values||[]);Array.from(document.getElementById(id).options).forEach(o=>o.selected=set.has(o.value))}
function workerHasSkill(w,skill){if(!skill||skill==="Bez požadavku")return true;return Array.isArray(w?.skills)&&w.skills.includes(skill)}
function plannedUnits(jobId){
  return db.assignments
    .filter(a=>Number(a.jobId)===Number(jobId))
    .reduce((s,a)=>s+Number(a.load||0),0)
}
function jobProgress(j){const estimated=Math.max(Number(j.estimated||0),0),actual=plannedUnits(j.id),pct = estimated > 0
  ? Math.round((actual / estimated) * 100)
  : 0;let color="#16a34a";if(pct>100)color="#dc2626";else if(pct>=85)color="#d97706";return{estimated,actual,pct,color,over:estimated>0&&actual>estimated}}
function isArchiveState(j){return["Dokončeno","Vyfakturováno","Storno"].includes(j.state)}
function matchesSearch(j){const q=document.getElementById("search").value.trim().toLowerCase();if(!q)return true;return[j.title,j.address,j.contact,j.phone,j.note,j.state,j.skill].join(" ").toLowerCase().includes(q)}
function matchesFilter(j){const f=document.getElementById("jobFilter").value,p=jobProgress(j);if(f==="active")return!isArchiveState(j);if(f==="archive")return isArchiveState(j);if(f==="to_invoice")return j.state==="Dokončeno";if(f==="overrun")return p.over;return true}
function switchTab(t){sideJobs.classList.toggle("hidden",t!=="jobs");sidePeople.classList.toggle("hidden",t!=="people");sideCars.classList.toggle("hidden",t!=="cars");tabJobs.classList.toggle("active",t==="jobs");tabPeople.classList.toggle("active",t==="people");tabCars.classList.toggle("active",t==="cars")}
function prevWeek(){weekStart=addDays(weekStart,-7);render()}
function nextWeek(){weekStart=addDays(weekStart,7);render()}
function goToday(){weekStart=monday(new Date());render()}
function rows(){const mode=viewMode.value;if(mode==="vehicles")return db.vehicles.map(v=>({kind:"vehicle",id:v.id,title:v.title,sub:[v.spz,v.type].filter(Boolean).join(" · "),capacity:Number(v.capacity||10)}));return db.workers.map(w=>({kind:"worker",id:w.id,title:w.title,sub:[w.email,w.phone].filter(Boolean).join(" · "),capacity:Number(w.capacity||10)}))}
function assignmentsFor(row,date){const d=iso(date);if(row.kind==="worker")return db.assignments.filter(a=>Number(a.workerId)===Number(row.id)&&a.date===d);return db.assignments.filter(a=>Number(a.vehicleId)===Number(row.id)&&a.date===d)}
function usedCapacity(row,ass,date){

  let used = row.kind==="worker"
    ? ass.reduce((s,a)=>s+Number(a.load||10),0)
    : ass.reduce((s,a)=>s+Number(a.vehicleLoad||10),0);

  if(row.kind === "worker"){

    const hasAbsence = db.absences.some(a =>
  Number(a.workerId) === Number(row.id) &&
  a.date === (
    typeof date === "string"
      ? date
      : iso(date)
  )
);
    if(hasAbsence){
      used += row.capacity;
    }
  }

  return used;
}
function getDayNotes(workerId,date){
  if(!db.notes){
    db.notes = [];
  }
  return db.notes.filter(n =>
    Number(n.workerId) === Number(workerId) &&
    n.date === date
  );
}

async function editDayNote(workerId,date){

  if(!canEdit){
    alert("Nemáte oprávnění");
    return;
  }

  if(!db.notes){
    db.notes = [];
  }
  const text = prompt("Nová poznámka:");

  if(!text){
    return;
  }
  db.notes.push({
    id: Date.now(),
    workerId,
    date,
    text
  });
  await saveDb();
  render();
}
async function deleteDayNote(noteId){
  if(!canEdit){
    alert("Nemáte oprávnění");
    return;
  }
  if(!confirm("Smazat poznámku?")){
    return;
  }
  db.notes = db.notes.filter(
    n => Number(n.id) !== Number(noteId)
  );
  await saveDb();
  render();
}
async function addAbsence(workerId,date){

  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }

  const type = prompt(
    "Typ volna:\n\nDovolená\nNemoc\nŠkolení\nHome office\nVolno"
  );

  if(!type) return;

  db.absences.push({
    id: nextId(db.absences),
    workerId,
    date,
    type
  });

  await saveDb();

  render();
}
async function deleteAbsence(id){

  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }

  if(!confirm("Smazat volno?")){
    return;
  }

  db.absences = db.absences.filter(
    a => Number(a.id) !== Number(id)
  );

  await saveDb();

  render();
}
async function editExistingNote(noteId){

  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }

  const note = db.notes.find(
    n => Number(n.id) === Number(noteId)
  );

  if(!note) return;

  const text = prompt(
    "Upravit poznámku:",
    note.text
  );

  if(text === null){
    return;
  }

  note.text = text;

  await saveDb();

  render();
}  
function dragJob(ev){const card=ev.target.closest(".job");ev.dataTransfer.setData("jobId",card.dataset.jobId);ev.dataTransfer.setData("assignmentId",card.dataset.assignmentId||"");ev.dataTransfer.effectAllowed="move"}
function allowDrop(ev){
  ev.preventDefault();
  ev.currentTarget.classList.add("dragover");
}

function leaveDrop(ev){
  ev.currentTarget.classList.remove("dragover");
}
async function dropJob(ev){
  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }
  ev.preventDefault();
  ev.currentTarget.classList.remove("dragover");
  const jobId = Number(ev.dataTransfer.getData("jobId"));
  const assignmentId = Number(ev.dataTransfer.getData("assignmentId") || 0);
  const rowKind = ev.currentTarget.dataset.rowKind;
  const rowId = Number(ev.currentTarget.dataset.rowId);
  const date = ev.currentTarget.dataset.date;
  const job = jobById(jobId);
  if(!job) return;
  let a = assignmentId
    ? assignmentById(assignmentId)
    : null;
  if(!a){
    a = {
      id: nextId(db.assignments),
      jobId,
      workerId: null,
      vehicleId: null,
      date,
      load: Number(job.load || 10),
      vehicleLoad: Number(job.vehicleLoad || 10)
    };
    db.assignments.push(a);
  }
  a.date = date;
  if(rowKind === "worker"){
    const hasAbsence = db.absences.some(x =>
  Number(x.workerId) === Number(rowId) &&
  x.date === date
);

if(hasAbsence){

  alert("Pracovník má v tento den volno.");

  return;
}
    a.workerId = rowId;
    const w = workerById(rowId);
    if(w && !workerHasSkill(w, job.skill)){
      setStatus("Upozornění: pracovník nemá požadovanou specializaci");
    }
  }
  if(rowKind === "vehicle"){
    a.vehicleId = rowId;
  }
  if(job.state === "Nová"){
    job.state = "Naplánováno";
  }
  await saveDb();
  render();
}

function openVehicle(id){selectedVehicleId=id||null;const v=id?vehicleById(id):null;vehicleModalTitle.textContent=v?"Detail vozidla":"Nové vozidlo";v_title.value=v?.title||"";v_spz.value=v?.spz||"";v_type.value=v?.type||"";v_capacity.value=v?.capacity||10;v_note.value=v?.note||"";deleteVehicleBtn.classList.toggle("hidden",!v);openModal("vehicleModal")}
async function saveVehicle(){
  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }
  const p = {
    title: v_title.value.trim(),
    spz: v_spz.value.trim(),
    type: v_type.value.trim(),
    capacity: Number(v_capacity.value || 10),
    note: v_note.value.trim()
  };
  if(!p.title){
    alert("Vyplň název vozidla.");
    return;
  }
  if(selectedVehicleId){
    const i = db.vehicles.findIndex(
      v => Number(v.id) === Number(selectedVehicleId)
    );
    db.vehicles[i] = {
      ...db.vehicles[i],
      ...p
    };
  }else{
    db.vehicles.push({
      id: nextId(db.vehicles),
      ...p
    });
  }
  const ok = await saveDb();
  if(!ok) return;
  closeModal("vehicleModal");
  render();
}
async function deleteVehicleDirect(id){selectedVehicleId=id;deleteVehicle()}
async function deleteVehicle(){
  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }
  if(!selectedVehicleId) return;
  if(!confirm("Smazat vozidlo? Zakázky zůstanou, jen se odebere vozidlo z přiřazení.")){
    return;
  }
  db.vehicles = db.vehicles.filter(
    v => Number(v.id) !== Number(selectedVehicleId)
  );
  db.assignments.forEach(a => {
    if(Number(a.vehicleId) === Number(selectedVehicleId)){
      a.vehicleId = null;
    }
  });
  db.assignments = db.assignments.filter(
    a => a.workerId || a.vehicleId
  );
  await saveDb();
  closeModal("vehicleModal");
  render();
}
function openAssignment(id){selectedAssignmentId=id;const a=assignmentById(id);if(!a)return;const j=jobById(a.jobId);a_job_title.value=j?.title||"";a_date.value=a.date||iso(new Date());a_load.value=a.load||10;a_vehicle_load.value=a.vehicleLoad||10;a_worker.innerHTML=`<option value="">Bez pracovníka</option>`+db.workers.map(w=>`<option value="${w.id}">${esc(w.title)}</option>`).join("");a_worker.value=a.workerId||"";a_vehicle.innerHTML=`<option value="">Bez vozidla</option>`+db.vehicles.map(v=>`<option value="${v.id}">${esc(v.title)} ${v.spz?"· "+esc(v.spz):""}</option>`).join("");a_vehicle.value=a.vehicleId||"";openModal("assignModal")}
async function saveAssignmentFromModal(){
  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }
  const a = assignmentById(selectedAssignmentId);
  if(!a) return;
  a.date = a_date.value;
  a.workerId = a_worker.value
    ? Number(a_worker.value)
    : null;
  a.vehicleId = a_vehicle.value
    ? Number(a_vehicle.value)
    : null;
  a.load = Number(a_load.value || 10);
  a.vehicleLoad = Number(a_vehicle_load.value || 10);
  if(!a.workerId && !a.vehicleId){
    db.assignments = db.assignments.filter(
      x => Number(x.id) !== Number(a.id)
    );
  }
  await saveDb();
  closeModal("assignModal");
  render();
}
async function unassignCurrent(){
  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }
  if(!selectedAssignmentId) return;
  db.assignments = db.assignments.filter(
    a => Number(a.id) !== Number(selectedAssignmentId)
  );
  await saveDb();
  closeModal("assignModal");
  render();
}
function exportData(){
  if(!canEdit){
    alert("Nemáte oprávnění k exportu");
    return;
  }
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="elmorrel-dispecink-data.json";a.click();URL.revokeObjectURL(url)
}
async function importData(e){
  if(!canEdit){
    alert("Nemáte oprávnění k úpravám");
    return;
  }
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = async () => {
    try{
      let imported = JSON.parse(r.result);
      if(imported.data){
        imported = imported.data;
      }
      if(
        !Array.isArray(imported.jobs) ||
        !Array.isArray(imported.workers) ||
        !Array.isArray(imported.vehicles) ||
        !Array.isArray(imported.assignments)
      ){
        alert("Soubor nemá správnou strukturu.");
        return;
      }
      db = imported;
      const ok = await saveDb();
      if(!ok) return;
      render();
      alert("Import hotový.");
    }catch(err){
      console.error("IMPORT ERROR:", err);
      alert("Import se nepodařil: " + err.message);
    }
  };
  r.readAsText(file);
  e.target.value = "";
}
let realtimeChannel = null;
function startRealtime(){
  if(!currentUser) return;
  if(realtimeChannel){
    supabaseClient.removeChannel(realtimeChannel);
  }
  realtimeChannel = supabaseClient
    .channel("app_state_changes")
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "app_state"
      },
      async (payload) => {
        console.log("Realtime změna", payload);
        const { data, error } = await supabaseClient
          .from("app_state")
          .select("data")
          .eq("id",1)
          .single();
        if(error){
          console.error(error);
          return;
        }
        if(data?.data){
          db = data.data;
          if(!db.notes){
            db.notes = [];
          }
        if(!db.absences){
          db.absences = [];
        }
          render();
          setStatus("Aktualizováno z cloudu");
        }
      }
    )
    .subscribe((status)=>{
      console.log("Realtime status:", status);
    });
}

</script>
</body>
</html>
